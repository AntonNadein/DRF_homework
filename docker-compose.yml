version: '3.9'

services:
  online-learning:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/code
      - media_volume:/code/media
      - static_volume:/code/static
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
    - ./.env

  db:
    image: postgres:16.0
    volumes:
      - postgres_data:/var/lib/postgres/data
    env_file:
      - ./.env
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $POSGTRES_USER" ]
      interval: 30s
      timeout: 10s
      retries: 5

  migrate:
    build: .
    command: python manage.py migrate
    depends_on:
      - db
    env_file:
      - ./.env

  redis:
    image: redis
    volumes:
      - ./redis_data:/data
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli ping | grep PONG" ]
      interval: 15s
      timeout: 5s
      retries: 5

  celery_worker:
    build:
      context: .
    command: celery -A config worker -l INFO
    volumes:
      - .:/app
    depends_on:
      - redis
    env_file:
      - ./.env

  celery_beat:
    build:
      context: .
    command: sh -c "sleep 10 && celery -A config beat -l info -S django"
    volumes:
      - .:/app
    depends_on:
      - redis
      - migrate
    env_file:
      - ./.env

volumes:
  postgres_data:
  static_volume:
  media_volume:
  redis_data: